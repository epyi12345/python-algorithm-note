site_name: Python Algorithm Note
site_description: Python algorithm problem-solving notes and wrong-answer reviews.
theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
nav:
  - Home: index.md
  - Dashboard: dashboard.md
  - Practice:
      - 0001 Order Settlement: practice/0001-order-settlement.md
      - 0002 Popular Products: practice/0002-popular-products.md
      - 0003 Range Sales Query: practice/0003-range-sales-query.md
      - 0004 Target Sales Window: practice/0004-target-sales-window.md
      - 0005 Next Growth Day: practice/0005-next-growth-day.md
      - 0006 Minimum Shipping Capacity: practice/0006-minimum-shipping-capacity.md
      - 0007 Store Map Shortest Path: practice/0007-store-map-shortest-path.md
  - Wrong Notes:
      - 0001. Order Settlement: wrong-notes/0001-order-settlement.md
      - 0002. Popular Products: wrong-notes/0002-popular-products.md
      - 0003. Range Sales Query: wrong-notes/0003-range-sales-query.md
  - Learning:
      - Overview: learning/index.md
      - Python Basics:
          - Python Input: learning/python-input.md
          - Time Complexity: learning/time-complexity.md
          - Implementation Thinking: learning/implementation-thinking.md
      - Data Structures:
          - dict, set, Counter: learning/dict-set-counter.md
          - defaultdict: learning/defaultdict.md
          - Stack: learning/stack.md
          - Queue and deque: learning/queue-deque.md
          - Heap and Priority Queue: learning/heap-priority-queue.md
      - Core Patterns:
          - Sorting and lambda: learning/sorting-and-lambda.md
          - Prefix Sum: learning/prefix-sum.md
          - Two Pointers: learning/two-pointers.md
          - Sliding Window: learning/sliding-window.md
          - Monotonic Stack: learning/monotonic-stack.md
      - Search and Graph:
          - Binary Search: learning/binary-search.md
          - Parametric Search: learning/parametric-search.md
          - BFS: learning/bfs.md
          - DFS and Recursion: learning/dfs-recursion.md
          - Grid Movement: learning/grid-movement.md
      - Strategy:
          - Greedy: learning/greedy.md
          - DP Introduction: learning/dp-introduction.md
  - Tools:
      - Python Editor: tools/python-editor.md
      - Practice Workbench: tools/practice-workbench.md
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - javascripts/editor-layout.js
  - javascripts/practice-workbench.js
markdown_extensions:
  - attr_list
  - md_in_html
  - admonition

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ko
          name: 한국어
          build: true
          site_name: epyi 알고리즘 노트
          nav_translations:
